<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Serendib Impact Initiative</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lato', sans-serif;
            color: #545454; /* Dark Grey */
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Poppins', sans-serif;
            color: #1f2937; /* A slightly darker grey for headings */
        }
        .bg-azure {
            background-color: #1482b4;
        }
        .text-azure {
            color: #1482b4;
        }
        .border-azure {
            border-color: #1482b4;
        }
        .hover\:bg-azure-dark:hover {
            background-color: #106a94;
        }
        .form-input {
            @apply w-full px-4 py-3 bg-gray-100 rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-azure text-sm;
        }
        .form-label {
            @apply block text-left font-bold mb-2;
            color: #1f2937; /* Match heading color for more prominence */
        }
    </style>
</head>
<body class="bg-white">

    <!-- Header Section -->
    <header class="container mx-auto px-6 py-6 text-center">
        <!-- Logo -->
        <a href="index.html" class="flex justify-center">
            <img src="https://serendibimpact.rf.gd/images/SerendibImpactLogo02.png" alt="Serendib Impact Initiative Logo" class="h-16 md:h-20 mb-8">
        </a>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-12">
        <div class="max-w-2xl mx-auto">
            <div class="text-center">
                <h2 class="text-4xl md:text-5xl font-bold">Get In Touch</h2>
                <p class="mt-4 text-lg text-gray-600">We welcome your perspective. Please share your thoughts below.</p>
            </div>

            <!-- Contact Form -->
            <form id="contact-form" action="https://formspree.io/f/mpwlzpja" method="POST" class="mt-12 space-y-6">
                
                <!-- Subject Field -->
                <div class="flex flex-col">
                    <label for="subject" class="form-label">Subject</label>
                    <input type="text" id="subject" name="subject" class="form-input" value="Serendib Impact Initiative Dialogue">
                </div>

                <!-- Email Field -->
                <div class="flex flex-col">
                    <label for="email" class="form-label">Your Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" required placeholder="you@example.com">
                </div>

                <!-- Message Field -->
                <div class="flex flex-col">
                    <label for="message" class="form-label">Your Message</label>
                    <textarea id="message" name="message" rows="6" class="form-input" required placeholder="Please share your insights..."></textarea>
                </div>
                
                <!-- Send Copy Checkbox with Spam Note -->
                <div class="flex flex-col">
                    <div class="flex items-center">
                        <input id="send-copy" name="_send_copy" type="checkbox" class="h-4 w-4 text-azure border-gray-300 rounded focus:ring-azure">
                        <label for="send-copy" class="ml-2 block text-sm text-gray-700">Send a copy of this message to my email address</label>
                    </div>
                    <p class="mt-2 text-xs text-gray-500 text-left pl-1">Note: The confirmation copy may land in your spam/junk folder.</p>
                </div>

                <!-- Submit Button -->
                <div class="text-center">
                    <button type="submit" class="w-full md:w-auto bg-azure text-white font-bold py-4 px-12 rounded-lg shadow-md hover:bg-azure-dark transition-transform transform hover:scale-105">
                        Send Message
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-8 mt-16">
        <p class="text-gray-500">&copy; 2025 Serendib Impact Initiative. All Rights Reserved.</p>
    </footer>
    
    <script>
        // This script handles the "send copy" functionality by using a hidden Formspree field.
        const form = document.getElementById('contact-form');
        const sendCopyCheckbox = document.getElementById('send-copy');

        form.addEventListener('submit', function(e) {
            if (sendCopyCheckbox.checked) {
                const userEmail = document.getElementById('email').value;
                // Formspree uses the '_cc' field to send a copy.
                // We create a hidden input to pass this information.
                const ccInput = document.createElement('input');
                ccInput.type = 'hidden';
                ccInput.name = '_cc';
                ccInput.value = userEmail;
                form.appendChild(ccInput);
            }
        });
    </script>

</body>
</html>
